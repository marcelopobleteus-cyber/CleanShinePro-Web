<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CleanShine Pro - Business Card</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Inter:wght@400;500;600&display=swap');

        :root {
            --navy: #0A2E5C;
            --emerald: #00A878;
            --white: #FFFFFF;
            --charcoal: #2C2C2C;
        }

        body {
            background-color: #f0f0f0;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            padding: 40px;
        }

        .card {
            width: 3.5in;
            height: 2in;
            background: white;
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            display: flex;
        }

        /* FRONT SIDE */
        .front {
            border-left: 8px solid var(--emerald);
        }

        .front-content {
            padding: 0.25in 0.35in;
            display: flex;
            flex-direction: column;
            justify-content: center;
            width: 100%;
        }

        .logo-placeholder {
            margin-bottom: 20px;
        }

        .logo-text {
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            color: var(--navy);
            font-size: 18pt;
            letter-spacing: -0.5px;
        }

        .logo-sub {
            color: var(--emerald);
            font-weight: 300;
        }

        .name {
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            font-size: 14pt;
            color: var(--navy);
            margin-bottom: 2px;
        }

        .title {
            font-size: 8pt;
            color: var(--emerald);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 20px;
        }

        .contact-info {
            font-size: 8pt;
            color: var(--charcoal);
            line-height: 1.4;
        }

        .contact-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* BACK SIDE */
        .back {
            background-color: var(--navy);
            color: var(--white);
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .tagline {
            font-family: 'Montserrat', sans-serif;
            font-weight: 600;
            font-size: 10pt;
            letter-spacing: 1px;
            margin-bottom: 20px;
        }

        .back-bullets {
            text-align: left;
            font-size: 7.5pt;
            line-height: 1.6;
        }

        .bullet {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .bullet::before {
            content: "•";
            color: var(--emerald);
            font-weight: bold;
        }

        .qr-placeholder {
            margin-top: 15px;
            width: 40px;
            height: 40px;
            background: white;
            padding: 2px;
        }

        /* Print styles */
        @media print {
            body {
                background: none;
                padding: 0;
            }

            .card {
                box-shadow: none;
                border: 1px solid #ddd;
                /* Light border for cutting guide */
                page-break-after: always;
            }
        }
    </style>
</head>

<body>

    <!-- FRONT -->
    <div class="card front">
        <div class="front-content">
            <div class="logo-placeholder">
                <img src="../01 Logo/logo.png" alt="CleanShine Pro" style="height: 60px; object-fit: contain;">
            </div>

            <div class="name">John Doe</div>
            <div class="title">Facility Manager</div>

            <div class="contact-info">
                <div class="contact-item">P: (555) 123-4567</div>
                <div class="contact-item">E: john@cleanshinepro.com</div>
                <div class="contact-item">W: www.cleanshinepro.com</div>
            </div>
        </div>
    </div>

    <!-- BACK -->
    <div class="card back">
        <div class="tagline">CORPORATE STANDARDS.</div>

        <div class="back-bullets">
            <div class="bullet">Commercial & Residential</div>
            <div class="bullet">Insured & Background Checked</div>
            <div class="bullet">Walkthrough + Proposal</div>
        </div>
    </div>

</body>

</html>
