<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 150">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&amp;display=swap');
      .white { fill: #FFFFFF; }
      .text-white { fill: #FFFFFF; font-family: 'Montserrat', sans-serif; font-weight: 800; }
    </style>
    <clipPath id="shield-clip">
       <path d="M20,20 L130,20 L130,60 Q130,120 75,140 Q20,120 20,60 Z" />
    </clipPath>
  </defs>

  <g transform="translate(10, 5) scale(0.9)">
    <g clip-path="url(#shield-clip)">
        <!-- For white logo, we make the base white -->
        <rect x="0" y="0" width="150" height="150" class="white" />
        
        <!-- The divider/stripe needs to be 'transparent' (knockout) to show background -->
        <path d="M-20,115 L160,45 L160,55 L-20,125 Z" fill="black" style="mix-blend-mode: destination-out;"/>
    </g>
    <!-- Star needs to be knockout too if on white shield -->
    <path d="M85,55 Q90,75 105,80 Q90,85 85,105 Q80,85 65,80 Q80,75 85,55 Z" fill="black" style="mix-blend-mode: destination-out;" />
  </g>

  <text x="165" y="85" font-size="56" class="text-white">CLEANSHINE</text>
  
  <g transform="translate(165, 105)">
    <line x1="0" y1="-8" x2="110" y2="-8" stroke="#FFFFFF" stroke-width="2" />
    <text x="120" y="5" font-size="28" class="text-white" font-weight="900">PRO</text>
    <line x1="195" y1="-8" x2="330" y2="-8" stroke="#FFFFFF" stroke-width="2" />
  </g>
</svg>
