<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&amp;display=swap');
      .navy { fill: #0A2E5C; }
      .emerald { fill: #00A878; }
      .white { fill: #FFFFFF; }
      .text-navy { fill: #0A2E5C; font-family: 'Montserrat', sans-serif; font-weight: 800; letter-spacing: -1px; text-anchor: middle; }
      .text-emerald { fill: #00A878; font-family: 'Montserrat', sans-serif; font-weight: 800; letter-spacing: 0.5px; text-anchor: middle;}
    </style>
  </defs>

  <!-- Group: Icon (Centered) -->
  <g id="icon" transform="translate(145, 20) scale(1.0)">
    <!-- Shield Geometry matches Horizontal -->
    <path class="navy" d="M10,20 L55,10 L100,20 L100,55 L25,115 L10,80 Z" />
    <path class="emerald" d="M30,120 L100,65 L100,80 Q55,140 10,80 Q15,100 30,120 Z" />
    <path class="white" d="M22,118 L100,55 L100,62 L28,122 Z" />
    <path class="white" d="M62,55 Q65,70 75,72 Q65,74 62,89 Q59,74 49,72 Q59,70 62,55 Z" />
  </g>

  <!-- Group: Wordmark (Centered Below) -->
  <g id="wordmark" transform="translate(200, 200)">
    <!-- CLEANSHINE -->
    <text x="0" y="0" font-size="48" class="text-navy">CLEANSHINE</text>
    
    <!-- PRO with Lines -->
    <g transform="translate(0, 30)">
       <!-- Adjusting positions for center alignment -->
       <!-- Total width approx 200? Text PRO is ~50 wide -->
       
       <!-- Left Line -->
       <line x1="-120" y1="-8" x2="-40" y2="-8" stroke="#0A2E5C" stroke-width="3" stroke-linecap="round" />
       
       <!-- Text -->
       <text x="0" y="5" font-size="28" class="text-emerald">PRO</text>
       
       <!-- Right Line -->
       <line x1="40" y1="-8" x2="120" y2="-8" stroke="#0A2E5C" stroke-width="3" stroke-linecap="round" />
    </g>
  </g>

</svg>
